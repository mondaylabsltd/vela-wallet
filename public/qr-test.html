<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Scanner Test</title>
<style>
body { font-family: system-ui; padding: 16px; background: #111; color: #eee; }
button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; background: #4f8; color: #000; margin: 8px 4px; }
#log { white-space: pre-wrap; font-family: monospace; font-size: 12px; background: #222; padding: 12px; border-radius: 8px; margin-top: 12px; max-height: 60vh; overflow-y: auto; }
.ok { color: #4f8; } .fail { color: #f44; } .info { color: #8cf; }
video { width: 100%; max-width: 400px; border-radius: 8px; }
</style>
</head>
<body>
<h2>QR Scanner Diagnostic</h2>

<div>
<button onclick="testBuiltinImage()">Test Built-in Image</button>
<button onclick="testFileUpload()">Upload Image</button>
<button onclick="testTakePhoto()">Take Photo</button>
<button onclick="testCamera()">Test Video</button>
<button onclick="saveFrame()">Save Frame</button>
<button onclick="document.getElementById('log').innerHTML=''">Clear</button>
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
<video id="video" playsinline muted autoplay style="display:none"></video>
<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script type="module">
import QrScanner from 'https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js';
window.QrScanner = QrScanner;

const log = document.getElementById('log');
window.addLog = function(msg, cls = '') {
  console.log(`[QR-TEST] ${msg}`);
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
};

// -------------------------------------------------------
// Core decode strategies
// -------------------------------------------------------
const OPTS = { inversionAttempts: 'attemptBoth' };

function tryJsQR(canvas, targetW, transform) {
  const tw = Math.min(canvas.width, targetW);
  const th = Math.round(tw * canvas.height / canvas.width);
  const small = document.createElement('canvas');
  small.width = tw; small.height = th;
  small.getContext('2d').drawImage(canvas, 0, 0, tw, th);
  const d = small.getContext('2d').getImageData(0, 0, tw, th);
  transform(d.data);
  const r = jsQR(d.data, tw, th, OPTS);
  return r?.data ?? null;
}

// Crop center square from canvas
function cropCenter(canvas) {
  const side = Math.min(canvas.width, canvas.height);
  const sx = Math.round((canvas.width - side) / 2);
  const sy = Math.round((canvas.height - side) / 2);
  const c = document.createElement('canvas');
  c.width = side; c.height = side;
  c.getContext('2d').drawImage(canvas, sx, sy, side, side, 0, 0, side, side);
  return c;
}

const NOOP = () => {};
const INVERT = (d) => { for (let i = 0; i < d.length; i += 4) { d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; } };
const BINARIZE = (t) => (d) => { for (let i = 0; i < d.length; i += 4) {
  const lum = (d[i]*77+d[i+1]*150+d[i+2]*29)>>8; const v = lum<=t?0:255;
  d[i]=v; d[i+1]=v; d[i+2]=v;
}};
// Binarize then invert: dark bg → white (quiet zone), bright QR → black
const BIN_INVERT = (t) => (d) => { for (let i = 0; i < d.length; i += 4) {
  const lum = (d[i]*77+d[i+1]*150+d[i+2]*29)>>8; const v = lum<=t?255:0;
  d[i]=v; d[i+1]=v; d[i+2]=v;
}};

// Load image file/url into canvas
async function fileToCanvas(source) {
  let url;
  if (typeof source === 'string') { url = source; }
  else { url = URL.createObjectURL(source); }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
  if (typeof source !== 'string') URL.revokeObjectURL(url);
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  addLog(`Image loaded: ${c.width}×${c.height}`, 'info');
  return c;
}

// Try all strategies on a canvas
async function decodeCanvas(canvas) {
  // Full image at all sizes — QR could be anywhere, don't crop
  const w = canvas.width;
  const targets = new Set([w]);
  for (const s of [1200, 1000, 800, 600, 400]) { if (s < w) targets.add(s); }
  const sizes = [...targets].sort((a, b) => b - a);

  const strategies = [
    // zbar WASM — strongest decoder, handles noisy photos
    ['zbar', async () => {
      try {
        if (!window.zbarWasm) {
          addLog('Loading zbar WASM...', 'info');
          window.zbarWasm = await import('https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js');
        }
        const { scanImageData } = window.zbarWasm;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const symbols = await scanImageData(imageData);
        if (symbols.length > 0) return symbols[0].decode();
      } catch(e) { addLog('zbar error: ' + e?.message, 'fail'); }
      return null;
    }],
    // zbar on inverted image
    ['zbar+inv', async () => {
      try {
        const { scanImageData } = window.zbarWasm || {};
        if (!scanImageData) return null;
        const ctx = canvas.getContext('2d');
        const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
        INVERT(d.data);
        const symbols = await scanImageData(d);
        if (symbols.length > 0) return symbols[0].decode();
      } catch {}
      return null;
    }],
  ];
  for (const s of sizes) {
    strategies.push(
      [`binInv160@${s}`, () => tryJsQR(canvas, s, BIN_INVERT(160))],
      [`invert@${s}`, () => tryJsQR(canvas, s, INVERT)],
    );
  }

  for (const [name, fn] of strategies) {
    const r = await fn();
    if (r) { addLog(`${name}: OK`, 'ok'); return r; }
    addLog(`${name}: FAIL`, 'fail');
  }
  return null;
}

addLog('Page loaded', 'info');
addLog(`HTTPS: ${location.protocol === 'https:'}`, 'info');
addLog(`BarcodeDetector: ${'BarcodeDetector' in window ? 'YES' : 'NO'}`, 'info');
addLog(`UA: ${navigator.userAgent.substring(0, 60)}...`, 'info');

// --- Test 1: built-in image ---
window.testBuiltinImage = async function() {
  addLog('=== Built-in WalletPair JPEG ===', 'info');
  const canvas = await fileToCanvas('/test-qr.jpg');
  const result = await decodeCanvas(canvas);
  if (result) addLog(`DECODED: ${result.substring(0, 60)}...`, 'ok');
  else addLog('ALL STRATEGIES FAILED', 'fail');
};

// --- Test 2: file upload ---
window.testFileUpload = function() { document.getElementById('fileInput').click(); };
// --- Test 2b: take photo (native camera) ---
window.testTakePhoto = function() { document.getElementById('photoInput').click(); };
window.handleFile = async function(input) {
  const file = input.files[0];
  if (!file) return;
  addLog(`=== Upload: ${file.name} (${(file.size/1024).toFixed(0)}KB) ===`, 'info');
  const canvas = await fileToCanvas(file);
  const result = await decodeCanvas(canvas);
  if (result) addLog(`DECODED: ${result.substring(0, 60)}...`, 'ok');
  else addLog('ALL STRATEGIES FAILED', 'fail');
};

// --- Save a camera frame for offline debugging ---
window.saveFrame = async function() {
  addLog('=== Saving camera frame ===', 'info');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = document.getElementById('video');
    video.style.display = 'block';
    video.srcObject = stream;
    await video.play();
    // Wait for focus
    await new Promise(r => setTimeout(r, 2000));
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    stream.getTracks().forEach(t => t.stop());
    video.style.display = 'none';
    // Download as PNG
    const blob = await new Promise(r => c.toBlob(r, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'camera-frame.png';
    a.click();
    URL.revokeObjectURL(url);
    addLog(`Saved ${c.width}×${c.height} frame`, 'ok');
  } catch(e) { addLog(`Error: ${e?.message}`, 'fail'); }
};

// --- Helper: video frame → JPEG blob → Image (denoises via JPEG compression) ---
async function captureAsPhoto(video, quality = 0.85) {
  const c = document.createElement('canvas');
  c.width = video.videoWidth; c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', quality));
  const url = URL.createObjectURL(blob);
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
  URL.revokeObjectURL(url);
  const out = document.createElement('canvas');
  out.width = img.naturalWidth; out.height = img.naturalHeight;
  out.getContext('2d').drawImage(img, 0, 0);
  return out;
}

// --- Test 3: camera (fake live = video preview + photo-style capture) ---
window.testCamera = async function() {
  addLog('=== Camera (photo-style) ===', 'info');
  const video = document.getElementById('video');
  video.style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
    await video.play();
    const s = stream.getVideoTracks()[0]?.getSettings?.();
    addLog(`Camera: ${s?.width}×${s?.height}`, 'info');

    let attempts = 0;
    const max = 30;

    async function tryDecode() {
      if (attempts >= max) {
        addLog(`Stopped after ${max} attempts`, 'fail');
        stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        return;
      }
      attempts++;

      // Method A: raw video frame → multi-strategy
      const raw = document.createElement('canvas');
      raw.width = video.videoWidth; raw.height = video.videoHeight;
      raw.getContext('2d').drawImage(video, 0, 0);

      // Only try the 2 fastest strategies on raw frames (save CPU)
      let result = tryJsQR(raw, 600, BINARIZE(160));
      if (!result) result = tryJsQR(raw, 400, INVERT);

      // Method B: JPEG round-trip (denoises), then full strategy
      if (!result) {
        try {
          const photo = await captureAsPhoto(video, 0.92);
          addLog(`  #${attempts} photo ${photo.width}×${photo.height}`, 'info');
          result = await decodeCanvas(photo);
        } catch(e) {
          addLog(`  #${attempts} photo error: ${e?.message}`, 'fail');
        }
      }

      if (result) {
        addLog(`Camera decoded #${attempts}: ${result.substring(0, 50)}...`, 'ok');
        stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        return;
      }

      if (attempts % 3 === 0) addLog(`Attempt ${attempts}/${max}...`, 'info');
      setTimeout(tryDecode, 1500); // longer gap = more time for auto-focus
    }
    // Wait 2s for camera to stabilize (auto-focus, auto-exposure)
    setTimeout(tryDecode, 2000);
  } catch (e) {
    addLog(`Camera error: ${e?.message}`, 'fail');
  }
};
</script>
</body>
</html>
