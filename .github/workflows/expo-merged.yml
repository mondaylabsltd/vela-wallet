# Post-merge Expo preview — the sibling of expo-preview.yml (which covers OPEN
# PRs). When a PR is MERGED, its per-PR `pr-<number>` update is orphaned, and
# nothing published the merged (main) state for testers to scan. This runs once
# on merge: it publishes an EAS Update on the `main` branch from the exact merge
# commit and comments the QR back onto the just-merged PR — so the PR ends with
# a "here's the same code, now live on main" build you can scan.
#
# Same fingerprint logic as the PR preview (see expo-preview.yml for the full
# explanation): `continuous-deploy-fingerprint` publishes a fast JS update when
# the native fingerprint matches an existing dev build, or triggers a dev build
# when native changed. `runtimeVersion: {"policy":"fingerprint"}` keeps the
# update↔runtime match exact.
#
# Prerequisites are identical to expo-preview.yml (repo secret EXPO_TOKEN, EAS
# build credentials). Without the token this workflow skips itself.
name: expo-merged

on:
  pull_request:
    types: [closed]

concurrency:
  # One deploy per PR; a re-run supersedes an in-flight one.
  group: expo-merged-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # Only merged PRs into this repo, and only when EXPO_TOKEN is present.
  # secrets.* isn't readable in a job-level `if`, so a tiny gate job exports it.
  gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.repo.full_name == github.repository
    outputs:
      has-token: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        run: echo "present=${{ secrets.EXPO_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: gate
    if: needs.gate.outputs.has-token == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # the QR / build-link comment on the merged PR
    steps:
      # The exact merge commit — the merged (main) state, race-free even if
      # another PR lands right after this one.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      # Publishes to the stable `main` EAS branch (and builds a dev client if the
      # native fingerprint changed). NOTE: this action's OWN comment is keyed by
      # projectId, so on a merge it EDITS the PR-open preview comment in place
      # rather than adding one — that's why a merge produced no visibly-new
      # comment. We capture its output and post our own fresh comment below.
      - uses: expo/expo-github-action/continuous-deploy-fingerprint@v9
        id: deploy
        with:
          profile: development
          branch: main
      # A brand-NEW comment on every merge (createComment, no sticky marker) with a
      # scannable QR for the update that just landed on `main`. Best-effort: if the
      # native fingerprint changed there's no update to publish (a build ran
      # instead) → update-output is empty and we skip; the Expo bot comment above
      # then carries the build link. continue-on-error so it never fails the deploy.
      - name: Post merged-build QR comment
        if: steps.deploy.outputs.update-output != ''
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          UPDATE_OUTPUT: ${{ steps.deploy.outputs.update-output }}
          PROJECT_ID: 0d798810-2982-455b-9079-7b9a7cabb97d
          # Must be a scheme the app actually registers (app.json `scheme`) — the
          # slug `vela-wallet` is NOT a URL scheme. Wrong value here = the deep
          # link resolves to no app.
          APP_SCHEME: velawallet
        with:
          script: |
            let updates = [];
            try {
              const p = JSON.parse(process.env.UPDATE_OUTPUT || '');
              updates = Array.isArray(p) ? p : (Array.isArray(p?.updates) ? p.updates : (p?.group ? [p] : []));
            } catch (e) { core.warning('update-output not parseable: ' + e); }
            // Unique update groups (fingerprint policy can publish one group per platform).
            const groups = new Map();
            for (const u of updates) {
              if (u && u.group) {
                if (!groups.has(u.group)) groups.set(u.group, []);
                groups.get(u.group).push(u.platform || '?');
              }
            }
            if (groups.size === 0) { core.info('No EAS Update group in output — skipping QR comment.'); return; }
            const { PROJECT_ID, APP_SCHEME } = process.env;
            const rows = [...groups.entries()].map(([group, plats]) => {
              // The QR must encode a dev-client DEEP LINK, not the expo.dev HTML
              // redirect page. The old QR encoded `https://expo.dev/eas-update?…`;
              // the in-app scanner GETs whatever it decodes, so it fetched that
              // web page and got `Content-Type: text/html` → the red
              // "Expected MIME-Type …" screen. Point straight at the update
              // manifest instead. Prefer the action-provided permalink; fall back
              // to the documented `u.expo.dev/<projectId>/group/<groupId>` form.
              const u = updates.find((x) => x.group === group) || {};
              const manifest = u.manifestPermalink || `https://u.expo.dev/${PROJECT_ID}/group/${group}`;
              const deep = `${APP_SCHEME}://expo-development-client/?url=${encodeURIComponent(manifest)}`;
              const qr = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=12&data=${encodeURIComponent(deep)}`;
              // Clickable browser fallback: expo.dev bounces to the same scheme.
              const permalink = `https://expo.dev/eas-update?appScheme=${APP_SCHEME}&projectId=${PROJECT_ID}&groupId=${group}`;
              const label = [...new Set(plats)].join(' + ');
              return `**${label}** — [Open in dev build](${permalink})<br/><img src="${qr}" width="200" height="200" alt="Merged main update QR (${label})" />`;
            });
            const sha = context.sha.slice(0, 7);
            const body = [
              '### 📦 Merged to `main` — scan the latest build',
              '',
              'Code from this PR **as it landed on main** (`' + sha + '`). Open the **Vela Wallet dev build** and scan (iPhone → iOS, Android → Android):',
              '',
              rows.join('\n\n'),
              '',
              '_No reinstall unless the runtime/fingerprint changed (native code). One-time setup + troubleshooting: see the tester guide on any open PR._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

      # When native code changed, the fingerprint moved and NO update is published
      # for that platform — a fresh dev build is started instead and testers must
      # reinstall. The Expo bot comment carries a Build Permalink but no QR, so you
      # can't scan-to-install. Post our own comment with a scannable QR for each
      # newly-started build's install page. The action exposes the build ids +
      # whether a new build started; the build page URL exists the moment it's
      # queued, so the QR is scannable immediately (watch it finish, then install).
      - name: Post merged build-install QR comment
        if: steps.deploy.outputs.android-did-start-new-build == 'true' || steps.deploy.outputs.ios-did-start-new-build == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ANDROID_BUILD_ID: ${{ steps.deploy.outputs.android-build-id }}
          IOS_BUILD_ID: ${{ steps.deploy.outputs.ios-build-id }}
          ANDROID_NEW: ${{ steps.deploy.outputs.android-did-start-new-build }}
          IOS_NEW: ${{ steps.deploy.outputs.ios-did-start-new-build }}
          BUILD_OWNER: monday-labs-ltd
          BUILD_SLUG: vela-wallet
        with:
          script: |
            const { ANDROID_BUILD_ID, IOS_BUILD_ID, ANDROID_NEW, IOS_NEW, BUILD_OWNER, BUILD_SLUG } = process.env;
            const rows = [];
            const add = (label, id, isNew) => {
              if (isNew !== 'true' || !id) return; // only platforms that need a reinstall
              const permalink = `https://expo.dev/accounts/${BUILD_OWNER}/projects/${BUILD_SLUG}/builds/${id}`;
              const qr = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=12&data=${encodeURIComponent(permalink)}`;
              rows.push(`**${label}** — [Install build](${permalink})<br/><img src="${qr}" width="200" height="200" alt="${label} dev build install QR" />`);
            };
            add('🍎 iOS', IOS_BUILD_ID, IOS_NEW);
            add('🤖 Android', ANDROID_BUILD_ID, ANDROID_NEW);
            if (rows.length === 0) { core.info('No newly-started build to post.'); return; }
            const sha = context.sha.slice(0, 7);
            const body = [
              '### 📲 New dev build — scan to install',
              '',
              'This merge changed **native code** (`' + sha + '`), so the runtime/fingerprint moved and a fresh dev build was started. Over-the-air updates can\'t load until you reinstall. Scan the QR on the target device (or open the link), wait for the build to finish, then install:',
              '',
              rows.join('\n\n'),
              '',
              '_Opening the build page needs Expo org access (one-time). After installing, JS-only merges update over-the-air again — no reinstall until native changes._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
