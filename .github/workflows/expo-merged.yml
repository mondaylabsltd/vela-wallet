# Post-merge Expo preview — the sibling of expo-preview.yml (which covers OPEN
# PRs). When a PR is MERGED, its per-PR `pr-<number>` update is orphaned, and
# nothing published the merged (main) state for testers to scan. This runs once
# on merge: it publishes an EAS Update on the `main` branch from the exact merge
# commit and comments the QR back onto the just-merged PR — so the PR ends with
# a "here's the same code, now live on main" build you can scan.
#
# Same fingerprint logic as the PR preview (see expo-preview.yml for the full
# explanation): `continuous-deploy-fingerprint` publishes a fast JS update when
# the native fingerprint matches an existing dev build, or triggers a dev build
# when native changed. `runtimeVersion: {"policy":"fingerprint"}` keeps the
# update↔runtime match exact.
#
# Prerequisites are identical to expo-preview.yml (repo secret EXPO_TOKEN, EAS
# build credentials). Without the token this workflow skips itself.
name: expo-merged

on:
  pull_request:
    types: [closed]

concurrency:
  # One deploy per PR; a re-run supersedes an in-flight one.
  group: expo-merged-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # Only merged PRs into this repo, and only when EXPO_TOKEN is present.
  # secrets.* isn't readable in a job-level `if`, so a tiny gate job exports it.
  gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.repo.full_name == github.repository
    outputs:
      has-token: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        run: echo "present=${{ secrets.EXPO_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: gate
    if: needs.gate.outputs.has-token == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # the QR / build-link comment on the merged PR
    steps:
      # The exact merge commit — the merged (main) state, race-free even if
      # another PR lands right after this one.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      # Publishes to the stable `main` EAS branch (and builds a dev client if the
      # native fingerprint changed). NOTE: this action's OWN comment is keyed by
      # projectId, so on a merge it EDITS the PR-open preview comment in place
      # rather than adding one — that's why a merge produced no visibly-new
      # comment. We capture its output and post our own fresh comment below.
      - uses: expo/expo-github-action/continuous-deploy-fingerprint@v9
        id: deploy
        with:
          profile: development
          branch: main
      # A brand-NEW comment on every merge (createComment, no sticky marker) with a
      # scannable QR for the update that just landed on `main`. Best-effort: if the
      # native fingerprint changed there's no update to publish (a build ran
      # instead) → update-output is empty and we skip; the Expo bot comment above
      # then carries the build link. continue-on-error so it never fails the deploy.
      - name: Post merged-build QR comment
        if: steps.deploy.outputs.update-output != ''
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          UPDATE_OUTPUT: ${{ steps.deploy.outputs.update-output }}
          PROJECT_ID: 0d798810-2982-455b-9079-7b9a7cabb97d
          APP_SCHEME: vela-wallet
        with:
          script: |
            let updates = [];
            try {
              const p = JSON.parse(process.env.UPDATE_OUTPUT || '');
              updates = Array.isArray(p) ? p : (Array.isArray(p?.updates) ? p.updates : (p?.group ? [p] : []));
            } catch (e) { core.warning('update-output not parseable: ' + e); }
            // Unique update groups (fingerprint policy can publish one group per platform).
            const groups = new Map();
            for (const u of updates) {
              if (u && u.group) {
                if (!groups.has(u.group)) groups.set(u.group, []);
                groups.get(u.group).push(u.platform || '?');
              }
            }
            if (groups.size === 0) { core.info('No EAS Update group in output — skipping QR comment.'); return; }
            const { PROJECT_ID, APP_SCHEME } = process.env;
            const rows = [...groups.entries()].map(([group, plats]) => {
              const deep = `https://expo.dev/eas-update?appScheme=${APP_SCHEME}&projectId=${PROJECT_ID}&groupId=${group}`;
              const qr = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=12&data=${encodeURIComponent(deep)}`;
              const label = [...new Set(plats)].join(' + ');
              return `**${label}** — [Update permalink](${deep})<br/><img src="${qr}" width="200" height="200" alt="Merged main update QR (${label})" />`;
            });
            const sha = context.sha.slice(0, 7);
            const body = [
              '### 📦 Merged to `main` — scan the latest build',
              '',
              'Code from this PR **as it landed on main** (`' + sha + '`). Open the **Vela Wallet dev build** and scan (iPhone → iOS, Android → Android):',
              '',
              rows.join('\n\n'),
              '',
              '_No reinstall unless the runtime/fingerprint changed (native code). One-time setup + troubleshooting: see the tester guide on any open PR._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
