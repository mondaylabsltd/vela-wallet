# Minimal CI gate — mirrors the local checks documented in
# docs/project-takeover/02-local-development.md.
#
# Deployment coupling (since 2026-07-02): merging to main auto-deploys the web
# wallet via Cloudflare Pages git integration (→ wallet.getvela.app). These two
# jobs are the merge gate — branch protection requires both green before merge.
# CF Pages builds independently of this workflow: a CF build failure shows in
# the CF dashboard, NOT here (CI green ≠ deployed).
#
# Deliberately NOT included:
#   - Playwright E2E: boots a Metro dev server + fixture relay; run locally via
#     `npm run test:e2e` (see docs/PARALLEL-SPACE-E2E-PLAYBOOK.md). Promote to CI
#     once it has a proven-stable record on a runner.
#   - price-query real-RPC suite: opt-in only (RUN_NETWORK_TESTS=1) — it depends
#     on third-party public RPC availability, not on our code.
#   - getvela.app: separate bun/SvelteKit project, checked in its own job below.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build HTTPS wallet SDK
        run: npm run build --prefix packages/vela-sdk
      - name: Lint
        run: npx expo lint -- --max-warnings=10000
      - name: Unit tests
        run: npx jest --ci
      - name: Web production build
        run: npm run build:web

  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: getvela.app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Svelte check
        run: bun run check
