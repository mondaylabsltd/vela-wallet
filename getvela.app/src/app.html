<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Vela Wallet" />
		<link rel="manifest" href="/site.webmanifest" />
		<!-- Open Graph / WeChat / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://getvela.app" />
		<meta property="og:title" content="Vela Wallet — No seed phrases. Just your fingerprint." />
		<meta
			property="og:description"
			content="Self-custodial Ethereum wallet secured by passkeys, built on audited Safe smart contracts. Open source."
		/>
		<meta property="og:image" content="https://getvela.app/getvela-app-preview.png" />
		<meta property="og:image:width" content="1734" />
		<meta property="og:image:height" content="907" />
		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Vela Wallet — No seed phrases. Just your fingerprint." />
		<meta
			name="twitter:description"
			content="Self-custodial Ethereum wallet secured by passkeys, built on audited Safe smart contracts. Open source."
		/>
		<meta name="twitter:image" content="https://getvela.app/getvela-app-preview.png" />
		<!-- Google Analytics 4 — only fires on the live domain so local dev / Cloudflare previews don't pollute the data -->
		<script>
			if (location.hostname === 'getvela.app') {
				const gaScript = document.createElement('script');
				gaScript.async = true;
				gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-K6HME392XH';
				document.head.appendChild(gaScript);
				window.dataLayer = window.dataLayer || [];
				function gtag() {
					dataLayer.push(arguments);
				}
				gtag('js', new Date());
				gtag('config', 'G-K6HME392XH');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
